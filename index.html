<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Text Cleaner</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png" type="image/png">
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #333;
            --primary: #4a90e2;
            --secondary: #a0aab5;
            --success: #6cbf6c;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 80px;
        }
        h1 { font-size: 1.4rem; text-align: center; margin-bottom: 20px; color: #555; }
        textarea {
            width: 100%; height: 220px; padding: 15px;
            border: 1px solid #ddd; border-radius: 15px;
            font-size: 16px; box-sizing: border-box; resize: vertical;
            margin-bottom: 15px; outline: none; background: white;
        }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button {
            padding: 16px; border: none; border-radius: 15px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            color: white; transition: opacity 0.2s;
        }
        .btn-clean { background: var(--primary); }
        .btn-clear { background: var(--secondary); }
        .btn-copy { background: var(--success); width: 100%; display: none; margin-top: 15px; }

        /* 🏠 Fridge Combo 統一デザイン：設定ボタンエリア */
        .settings-area {
            margin-top: 50px; border-top: 2px dashed #e1e4e8;
            padding-top: 25px; text-align: center;
        }
        .btn-settings {
            background: #444; width: 100%; padding: 12px;
            font-size: 14px; border-radius: 10px;
        }

        /* 📣 Fridge Combo 統一デザイン：すっきりポップアップ */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.4);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px;
            width: 85%; max-width: 320px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .modal-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; }
        .modal-body { font-size: 0.9rem; color: #666; margin-bottom: 20px; line-height: 1.6; text-align: left; }
        .btn-modal-close { background: var(--primary); padding: 10px 30px; border-radius: 10px; width: auto; }
        .footer { text-align: center; font-size: 11px; color: #bbb; margin-top: 30px; }
    </style>
</head>
<body>

    <h1>✨ Smart Text Cleaner</h1>

    <textarea id="inputText" placeholder="Paste messy text here..."></textarea>

    <div class="btn-group">
        <button class="btn-clean" onclick="cleanText()">1. Clean Text</button>
        <button class="btn-clear" onclick="clearText()">Clear Input</button>
    </div>

    <button id="copyBtn" class="btn-copy" onclick="copyText()">2. Copy Result</button>

    <div class="settings-area">
        <button class="btn-settings" onclick="openModal()">App Settings</button>
    </div>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title">🏠 How to Add to Home</div>
            <div class="modal-body">
                <strong>【iPhone / Safari】</strong><br>
                Tap "Share" button at the bottom, then select "Add to Home Screen".<br><br>
                <strong>【Android / Chrome】</strong><br>
                Tap "Menu" (3 dots), then select "Install app" or "Add to Home screen".
            </div>
            <button class="btn-modal-close" onclick="closeModal()">OK</button>
        </div>
    </div>

    <div class="footer">Minimalist & Ad-free Tool by afrorakda</div>

    <script>
        function cleanText() {
            const area = document.getElementById('inputText');
            let t = area.value;
            if(!t) return;
            // 徹底洗浄ロジック
            t = t.split('\n').map(line => line.trim()).join('\n'); // 各行の前後スペース削除
            t = t.replace(/\n{3,}/g, '\n\n'); // 3つ以上の改行を2つに
            area.value = t.trim();
            const btn = document.getElementById('copyBtn');
            btn.style.display = 'block';
            btn.innerText = '2. Copy Result';
        }

        function clearText() {
            const area = document.getElementById('inputText');
            area.value = '';
            area.focus();
            document.getElementById('copyBtn').style.display = 'none';
        }

        async function copyText() {
            const area = document.getElementById('inputText');
            try {
                await navigator.clipboard.writeText(area.value);
                const btn = document.getElementById('copyBtn');
                btn.innerText = '✅ Copied!';
                setTimeout(() => { btn.innerText = '2. Copy Result'; }, 2000);
            } catch (err) { alert('Failed to copy'); }
        }

        function openModal() { document.getElementById('modalOverlay').classList.add('show'); }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
    </script>
</body>
</html>
