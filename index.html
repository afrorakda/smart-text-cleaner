<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Smart Text Cleaner</title>
    
    <link rel="icon" href="image_2.png">
    <link rel="apple-touch-icon" href="image_2.png">
    
    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); display: flex; justify-content: center; 
            padding: 20px; margin: 0; color: var(--main); 
            -webkit-font-smoothing: antialiased; 
        }
        
        .container { width: 100%; max-width: 380px; min-height: 95vh; display: flex; flex-direction: column; }
        
        header { margin: 25px 0 35px; }
        h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.8px; margin: 0 0 5px; display: flex; align-items: center; gap: 10px; }
        h1 img { width: 32px; height: 32px; border-radius: 8px; }
        .subtitle { font-size: 0.85rem; color: #666; font-weight: 500; }

        .input-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        #inputArea { 
            width: 100%; height: 220px; padding: 18px; 
            border: 2px solid var(--accent); border-radius: var(--radius); 
            box-sizing: border-box; font-size: 16px; font-weight: 600;
            outline: none; transition: 0.2s; background: var(--input-bg);
            line-height: 1.5; resize: none;
            -webkit-appearance: none; -webkit-text-fill-color: var(--main); opacity: 1 !important;
        }
        #inputArea:focus { border-color: var(--main); }
        #inputArea::placeholder { color: #bbb; -webkit-text-fill-color: #bbb; opacity: 1; }

        .clr-btn { 
            position: absolute; right: 15px; top: 15px; 
            background: none; border: none; font-size: 20px; color: #ccc; 
            cursor: pointer; display: none; padding: 5px;
        }

        .button-group { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 30px; }
        .btn-clean-copy { 
            padding: 18px; border: none; border-radius: var(--radius); 
            background-color: var(--main); color: white;
            font-size: 1rem; font-weight: 800; cursor: pointer; transition: 0.2s; 
        }
        .btn-clean-copy:active { transform: scale(0.96); opacity: 0.9; }

        /* Footer & Buttons */
        footer { margin-top: auto; padding: 30px 0 20px; text-align: center; border-top: 1px solid #f5f5f5; font-size: 12px; color: #666; font-weight: 600; }
        .footer-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .row { display: flex; gap: 10px; }
        .kofi-btn { flex: 1; background: var(--main); color: #fff; padding: 12px; border-radius: var(--radius); text-decoration: none; font-weight: bold; font-size: 13px; display: flex; align-items: center; justify-content: center; min-height: 44px; }
        .home-btn { flex: 1; background: var(--accent); color: var(--main); border: none; padding: 12px; border-radius: var(--radius); font-weight: 800; font-size: 13px; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; min-height: 44px; }
        .install-trigger { background: var(--accent); color: var(--main); border: none; padding: 10px; border-radius: var(--radius); font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; min-height: 36px; }
        
        .footer-info { line-height: 1.6; }
        .footer-info a { color: inherit; text-decoration: underline; }

        /* Modal Styles */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; width: 85%; max-width: 340px; padding: 30px; border-radius: var(--radius); text-align: left; position: relative; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #888; cursor: pointer; }
        
        #toast { position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%); background: var(--main); color: white; padding: 12px 24px; border-radius: 25px; font-size: 0.85rem; font-weight: 700; display: none; z-index: 100; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>
            <img src="image_2.png" alt="">
            Smart Text Cleaner
        </h1>
        <p class="subtitle">Cleaner & Word counter for SNS marketers.</p>
    </header>
    
    <div class="input-wrapper">
        <textarea id="inputArea" placeholder="Paste your messy text here..." oninput="handleInput(this)"></textarea>
        <button id="clearBtn" class="clr-btn" onclick="clearText()">&times;</button>
    </div>
    
    <div class="button-group">
        <button class="btn-clean-copy" id="cleanCopyBtn">Clean & Copy</button>
    </div>

    <footer id="dynamic-footer">
        <div class="footer-btns">
            <div class="row">
                <div id="kofi-placeholder" class="kofi-btn" style="opacity: 0.5;">Loading...</div>
                <a href="https://afrorakda.github.io/" class="home-btn">🏠 Hub</a>
            </div>
            <button class="install-trigger" style="opacity: 0.5;">Add to Home Screen</button>
        </div>
        <div class="footer-info">
            No login / No tracking / No ads / Browser only<br>
            Privacy Policy / afrorakda © 2026
        </div>
    </footer>
</div>

<div id="toast">Copied!</div>

<script>
    const area = document.getElementById('inputArea');
    const clearBtn = document.getElementById('clearBtn');

    function handleInput(el) {
        clearBtn.style.display = el.value ? 'block' : 'none';
    }

    function clearText() {
        area.value = '';
        clearBtn.style.display = 'none';
        area.focus();
    }

    document.getElementById('cleanCopyBtn').onclick = () => {
        let val = area.value.trim();
        if (!val) return;
        let clean = val.split('\n').map(line => line.trim()).join('\n').replace(/\n{3,}/g, '\n\n');
        
        navigator.clipboard.writeText(clean).then(() => {
            area.value = clean;
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1500);
        });
    };

    function showModal() { 
        const modal = document.getElementById('modal');
        if(modal) modal.style.display = 'flex'; 
    }
    function hideModal() { 
        const modal = document.getElementById('modal');
        if(modal) modal.style.display = 'none'; 
    }

    async function loadFooter() {
        const footerElem = document.getElementById('dynamic-footer');
        try {
            const response = await fetch('footer.json');
            if (!response.ok) throw new Error("JSON not found");
            const data = await response.json();
            
            // データを取得できたら上書き
            footerElem.innerHTML = `
                <div class="footer-btns">
                    <div class="row">
                        <a href="${data.kofi.url}" target="_blank" class="kofi-btn">${data.kofi.text}</a>
                        <a href="https://afrorakda.github.io/" class="home-btn">🏠 Hub</a>
                    </div>
                    <button class="install-trigger" onclick="showModal()">${data.install.text}</button>
                </div>
                <div class="footer-info">
                    No login / No tracking / No ads / Browser only<br>
                    <a href="${data.privacy.url}">${data.privacy.text}</a><br>
                    Smart Text Cleaner © 2026
                </div>
            `;

            const modalDiv = document.createElement('div');
            modalDiv.id = 'modal';
            modalDiv.onclick = hideModal;
            modalDiv.innerHTML = `
                <div class="modal-content" onclick="event.stopPropagation()">
                    <span class="close-x" onclick="hideModal()">×</span>
                    <h3 style="margin-top:0;">${data.install.title}</h3>
                    <p style="font-size:14px; font-weight:600;">${data.install.msg}</p>
                    <p style="font-size:13px; color:#666;">${data.install.ios}</p>
                    <p style="font-size:13px; color:#666;">${data.install.android}</p>
                </div>
            `;
            document.body.appendChild(modalDiv);
        } catch (err) {
            // 読み込めなかった場合は、デフォルトの内容でHubボタンだけは生かす
            footerElem.innerHTML = `
                <div class="footer-btns">
                    <div class="row">
                        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
                        <a href="https://afrorakda.github.io/" class="home-btn">🏠 Hub</a>
                    </div>
                </div>
                <div class="footer-info">
                    No login / No tracking / No ads / Browser only<br>
                    Privacy Policy / afrorakda © 2026
                </div>
            `;
        }
    }

    window.addEventListener('DOMContentLoaded', loadFooter);
</script>
</body>
</html>
