<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Text Cleaner</title>
    <style>
        :root { --bg: #f8f9fa; --text: #212529; --primary: #007bff; --secondary: #6c757d; --success: #28a745; --danger: #dc3545; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); max-width: 600px; margin: 0 auto; padding: 20px; line-height: 1.5; }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; font-size: 16px; box-sizing: border-box; resize: vertical; margin-bottom: 10px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        button { padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; color: white; }
        button:active { opacity: 0.7; }
        .btn-clean { background: var(--primary); }
        .btn-clear { background: var(--secondary); }
        .btn-copy { background: var(--success); width: 100%; display: none; }
        .footer { text-align: center; font-size: 12px; color: var(--secondary); margin-top: 30px; }
    </style>
</head>
<body>

    <h1>✨ Smart Text Cleaner</h1>

    <textarea id="inputText" placeholder="Paste messy text here..."></textarea>

    <div class="btn-group">
        <button class="btn-clean" onclick="cleanText()">1. Clean Text</button>
        <button class="btn-clear" onclick="clearText()">Clear Input</button>
    </div>

    <button id="copyBtn" class="btn-copy" onclick="copyText()">2. Copy Result</button>

    <div class="footer">
        A minimalist, ad-free tool. ✅No login, ✅No tracking.<br>
        Built by afrorakda
    </div>

    <script>
        function cleanText() {
            const area = document.getElementById('inputText');
            let text = area.value;
            
            text = text.replace(/^[ \t]+/gm, ''); // 行頭のスペース削除
            text = text.replace(/[ \t]+$/gm, ''); // 行末のスペース削除
            text = text.replace(/\n{3,}/g, '\n\n'); // 3つ以上の改行を2つに
            
            area.value = text.trim();
            document.getElementById('copyBtn').style.display = 'block';
            document.getElementById('copyBtn').innerText = '2. Copy Result';
        }

        function clearText() {
            const area = document.getElementById('inputText');
            area.value = '';
            area.focus();
            document.getElementById('copyBtn').style.display = 'none';
        }

        async function copyText() {
            const text = document.getElementById('inputText').value;
            const btn = document.getElementById('copyBtn');
            try {
                await navigator.clipboard.writeText(text);
                btn.innerText = '✅ Copied!';
                setTimeout(() => { btn.innerText = '2. Copy Result'; }, 2000);
            } catch (err) {
                alert('Failed to copy');
            }
        }
    </script>
</body>
</html>
