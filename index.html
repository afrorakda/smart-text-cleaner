<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Text Cleaner</title>
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        :root {
            --primary-bg: #fdf6f0; /* 優しいパステルベージュ */
            --accent-color: #ffb7b2; /* 優しいピンク */
            --text-color: #5d5d5d;
            --card-bg: #ffffff;
            --border-radius: 18px;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 10px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        h1 img {
            width: 24px;
            height: 24px;
        }

        /* テキストエリア */
        #inputArea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: none;
            border-radius: var(--border-radius);
            background: var(--card-bg);
            box-shadow: var(--shadow);
            font-size: 16px;
            resize: none;
            outline: none;
            color: var(--text-color);
            line-height: 1.5;
        }

        /* ボタンエリア */
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-clear {
            background-color: #eeeeee;
            color: #888;
        }

        .btn-clean-copy {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 183, 178, 0.4);
        }

        /* 下部設定ボタン */
        .footer-settings {
            margin-top: auto;
            padding: 20px 0;
            text-align: center;
        }

        #openSettings {
            background: none;
            color: #b0b0b0;
            font-size: 0.9rem;
            text-decoration: underline;
            font-weight: normal;
        }

        /* モーダル/ポップアップ (Fridge Combo風) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--card-bg);
            width: 85%;
            max-width: 350px;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        .modal-content h2 {
            font-size: 1.1rem;
            margin-top: 0;
        }

        .guide-box {
            text-align: left;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            font-size: 0.85rem;
            margin: 15px 0;
            line-height: 1.6;
        }

        .btn-close {
            background: var(--accent-color);
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        /* トースト通知 (コピー完了時など) */
        #toast {
            position: fixed;
            bottom: 100px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            display: none;
            z-index: 2000;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <img src="icon.png" alt="" onerror="this.style.display='none'">
        Smart Text Cleaner
    </h1>

    <textarea id="inputArea" placeholder="ここにテキストをペースト..."></textarea>

    <div class="button-group">
        <button class="btn-clear" id="clearBtn">Clear</button>
        <button class="btn-clean-copy" id="cleanCopyBtn">Clean & Copy</button>
    </div>

    <div class="footer-settings">
        <button id="openSettings">App Settings</button>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <h2>Add to Home Screen</h2>
        <div class="guide-box" id="guideContent">
            </div>
        <button class="btn-close" id="closeSettings">Close</button>
    </div>
</div>

<div id="toast">Copied!</div>

<script>
    const inputArea = document.getElementById('inputArea');
    const clearBtn = document.getElementById('clearBtn');
    const cleanCopyBtn = document.getElementById('cleanCopyBtn');
    const openSettings = document.getElementById('openSettings');
    const closeSettings = document.getElementById('closeSettings');
    const modalOverlay = document.getElementById('modalOverlay');
    const guideContent = document.getElementById('guideContent');
    const toast = document.getElementById('toast');

    // --- 1. 洗浄 & コピーロジック ---
    function cleanAndCopy() {
        let text = inputArea.value;
        if (!text.trim()) return;

        // 洗浄プロセス
        let cleaned = text
            .split('\n')
            .map(line => line.trim()) // 行頭・行末の空白削除
            .join('\n')
            .replace(/\n{3,}/g, '\n\n') // 3つ以上の連続改行を2つに
            .trim(); // 前後の不要な改行削除

        // クリップボードへ書き込み
        navigator.clipboard.writeText(cleaned).then(() => {
            inputArea.value = cleaned; // 画面表示も洗浄後のものに更新
            showToast('Cleaned & Copied!');
        }).catch(err => {
            console.error('Copy failed', err);
        });
    }

    // --- 2. クリア機能 (即時実行) ---
    function clearText() {
        inputArea.value = '';
        inputArea.focus();
    }

    // --- 3. ホーム画面追加ガイド ---
    function showSettings() {
        const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const isAndroid = /Android/.test(navigator.userAgent);

        if (isiOS) {
            guideContent.innerHTML = `
                <strong>For iPhone (Safari):</strong><br>
                1. Tap the <strong>Share</strong> button ( <img src="https://img.icons8.com/ios/20/000000/share-rounded.png" style="vertical-align:middle"> ).<br>
                2. Select <strong>'Add to Home Screen'</strong>.<br>
                3. Tap 'Add' to finish.
            `;
        } else if (isAndroid) {
            guideContent.innerHTML = `
                <strong>For Android (Chrome):</strong><br>
                1. Tap the <strong>Menu</strong> ( 3 dots ) at the top right.<br>
                2. Select <strong>'Install app'</strong> or 'Add to Home screen'.<br>
                3. Follow the prompt to install.
            `;
        } else {
            guideContent.innerHTML = `
                Please use your browser's menu to "Add to Home Screen" or "Bookmark" this tool for quick access.
            `;
        }
        modalOverlay.style.display = 'flex';
    }

    // --- 4. ユーティリティ ---
    function showToast(message) {
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }

    // --- イベントリスナー ---
    cleanCopyBtn.addEventListener('click', cleanAndCopy);
    clearBtn.addEventListener('click', clearText);
    openSettings.addEventListener('click', showSettings);
    closeSettings.addEventListener('click', () => modalOverlay.style.display = 'none');
    
    // 背景クリックで閉じる
    modalOverlay.addEventListener('click', (e) => {
        if(e.target === modalOverlay) modalOverlay.style.display = 'none';
    });
</script>

</body>
</html>
