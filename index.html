<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Text Cleaner</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png" type="image/png">
    
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #212529;
            --primary: #007bff;
            --secondary: #6c757d;
            --success: #28a745;
            --dark: #343a40;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.5;
            padding-bottom: 80px;
        }
        h1 { font-size: 1.6rem; text-align: center; margin-bottom: 20px; }
        textarea {
            width: 100%;
            height: 220px;
            padding: 12px;
            border: 2px solid #ced4da;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            resize: vertical;
            margin-bottom: 15px;
            outline: none;
        }
        textarea:focus { border-color: var(--primary); }
        
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); opacity: 0.8; }
        
        .btn-clean { background: var(--primary); }
        .btn-clear { background: var(--secondary); }
        .btn-copy {
            background: var(--success);
            width: 100%;
            display: none; /* 最初は隠す */
            margin-top: 10px;
        }

        /* 🏠 ホーム追加セクション（Fridge Comboと統一） */
        .home-section {
            margin-top: 50px;
            border-top: 2px dashed #dee2e6;
            padding-top: 25px;
            text-align: center;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--secondary);
        }
        .btn-add-home {
            background: var(--dark);
            width: 100%;
            padding: 12px;
            font-size: 14px;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #adb5bd;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <h1>✨ Smart Text Cleaner</h1>

    <textarea id="inputText" placeholder="Paste messy text here..."></textarea>

    <div class="btn-group">
        <button class="btn-clean" onclick="cleanText()">1. Clean Text</button>
        <button class="btn-clear" onclick="clearText()">Clear Input</button>
    </div>

    <button id="copyBtn" class="btn-copy" onclick="copyText()">2. Copy Result</button>

    <div class="home-section">
        <div class="section-title">🏠 App Settings</div>
        <button id="addHomeBtn" class="btn-add-home">Add to Home Screen</button>
    </div>

    <div class="footer">
        Minimalist & Ad-free Tool.<br>
        Developed by afrorakda
    </div>

    <script>
        function cleanText() {
            const area = document.getElementById('inputText');
            let text = area.value;
            if(!text) return;

            // 洗浄ロジック
            text = text.replace(/^[ \t]+/gm, ''); // 行頭スペース削除
            text = text.replace(/[ \t]+$/gm, ''); // 行末スペース削除
            text = text.replace(/\n{3,}/g, '\n\n'); // 3つ以上の改行を2つに
            
            area.value = text.trim();
            
            // コピーボタンを表示
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.style.display = 'block';
            copyBtn.innerText = '2. Copy Result';
        }

        function clearText() {
            if(confirm('Clear all text?')) {
                const area = document.getElementById('inputText');
                area.value = '';
                document.getElementById('copyBtn').style.display = 'none';
                area.focus();
            }
        }

        async function copyText() {
            const text = document.getElementById('inputText').value;
            const btn = document.getElementById('copyBtn');
            try {
                await navigator.clipboard.writeText(text);
                const originalText = btn.innerText;
                btn.innerText = '✅ Copied!';
                setTimeout(() => { btn.innerText = originalText; }, 2000);
            } catch (err) {
                alert('Copy failed. please select and copy manually.');
            }
        }
        
        // ホーム画面追加の案内
        document.getElementById('addHomeBtn').addEventListener('click', () => {
            alert('To add to Home Screen:\n\n【iPhone/Safari】\nTap "Share" -> "Add to Home Screen"\n\n【Android/Chrome】\nTap "Menu (3 dots)" -> "Install app" or "Add to Home screen"');
        });
    </script>
</body>
</html>
